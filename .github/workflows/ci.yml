name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Build, Test & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality checks
        run: pnpm ci:quality

      - name: Build packages and apps
        run: pnpm ci:build

      - name: Typecheck
        run: pnpm ci:typecheck

      - name: Install Playwright browsers
        run: pnpm ci:playwright

      - name: Tests and coverage
        run: pnpm ci:test

      - name: Smoke packages
        run: pnpm ci:smoke
