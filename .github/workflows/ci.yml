name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint, build, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build packages
        run: pnpm build

      - name: Build native playground
        run: pnpm build:native-playground

      - name: Typecheck
        run: pnpm typecheck

      - name: API docs
        run: pnpm docs:api:check

      - name: Install Playwright browsers
        run: pnpm --filter @vellira/web-storybook run playwright:install

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm test:coverage

      - name: Smoke packages
        run: pnpm smoke:packages

      - name: Public API check
        run: pnpm check:public-api

      - name: Build Storybook
        run: pnpm --filter @vellira/web-storybook build
